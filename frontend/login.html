<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - User Authentication</title>
    <link rel="stylesheet" href="output.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="bg-linear-to-br from-blue-50 to-indigo-100 min-h-screen">
    <!-- Alert Container -->
    <div id="alertContainer" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <div class="container mx-auto px-4 py-8">
      <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg p-8 mt-20">
        <h2 class="text-3xl font-bold text-center text-gray-800 mb-6">
          Welcome Back
        </h2>
        <form class="space-y-4" onsubmit="handleLogin(event)">
          <div>
            <label class="block text-gray-700 font-medium mb-2">Email</label>
            <input
              type="email"
              id="loginEmail"
              required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
            />
          </div>
          <div>
            <label class="block text-gray-700 font-medium mb-2">Password</label>
            <input
              type="password"
              id="loginPassword"
              required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
            />
          </div>
          <button
            type="submit"
            class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 font-medium transition"
          >
            Login
          </button>
        </form>
        <div class="mt-6 text-center space-y-2">
          <a
            href="forgot-password.html"
            class="text-indigo-600 hover:underline text-sm block"
            >Forgot Password?</a
          >
          <p class="text-gray-600">
            Don't have an account?
            <a
              href="register.html"
              class="text-indigo-600 hover:underline font-medium"
              >Register</a
            >
          </p>
        </div>
      </div>
    </div>

    <script src="./auth.js"></script>
  </body>
</html>
